<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios con bootstrap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../Segundo Ejercicio/menu-styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../Segundo Ejercicio/formulario.html">🪪 Crear cuenta</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../Segundo Ejercicio/formulario2.html">📦 Registro de Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../Segundo Ejercicio/formulario3.html">📋 Listados de usuarios</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <main class="main-content">
        <div class="container py-5">
            <div class="row mb-5">
                <div class="col-lg-8 mx-auto">
                    <h1 class="page-title mb-3">Formularios con Bootstrap</h1>
                    <p class="page-subtitle">Este es un formulario de listados de usuarios</p>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-6 mx-auto">
                    <form>
                        <div class="row mb-3">
                            <label for="Reg Desde" class="col-sm-4 col-form-label">ID Desde</label>
                            <div class="col-sm-8">
                                <div class="input-group">
                                    <input type="text" class="form-control" id="Reg Desde" placeholder="Desde">
                                </div>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label for="Reg Hasta" class="col-sm-4 col-form-label">ID Hasta</label>
                            <div class="col-sm-8">
                                <div class="input-group">
                                    <input type="text" class="form-control" id="Reg Hasta" placeholder="Hasta">
                                </div>
                            </div>
                        </div>
                        <div class="row mt-4">
                            <div class="col-12 text-center">
                                <button type="button" class="btn btn-secondary">Previzualizar informe</button>
                                <button type="button" class="btn btn-danger">Exportar PDF</button>
                                <button type="button" class="btn btn-success">Exportar Excel</button>
                                <button type="button" class="btn btn-secondary">Salir</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Navbar de Regreso -->
    <nav class="navbar navbar-expand-lg navbar-custom mt-5">
        <div class="container-fluid">
            <div class="navbar-collapse">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../Menu - Pricipal - All Trabajos/menu-principal.html">🏠 Volver al inicio</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
