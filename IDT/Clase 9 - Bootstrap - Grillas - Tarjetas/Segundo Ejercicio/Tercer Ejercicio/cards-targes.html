        let productosVisibles = 6;
        const productosPorCarga = 6;

        function renderizarProductos() {
            const contenedor = document.getElementById('productosContainer');
            const botón = document.getElementById('btnMostrarMas');
            
            contenedor.innerHTML = '';
            
            for (let i = 0; i < productosVisibles && i < productos.length; i++) {
                const producto = productos[i];
                const productoHTML = `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 shadow-sm">
                            <img src="${producto.imagen}" class="card-img-top" alt="${producto.nombre}" style="cursor: pointer;" onclick="abrirDetalles(${producto.id})">
                            <div class="card-body">
                                <h5 class="card-title">
                                    <a href="javascript:void(0);" onclick="abrirDetalles(${producto.id})" style="text-decoration: none; color: #0066cc;">
                                        ${producto.nombre}
                                    </a>
                                </h5>
                                <p class="card-text">${producto.descripcion}</p>
                            </div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += productoHTML;
            }
            
            // Ocultar botón si se muestran todos los productos
            if (productosVisibles >= productos.length) {
                botón.style.display = 'none';
            } else {
                botón.style.display = 'block';
            }
        }

        document.getElementById('btnMostrarMas').addEventListener('click', function() {
            productosVisibles += productosPorCarga;
            renderizarProductos();
        });

        function abrirDetalles(id) {
            // Guardar el producto en sessionStorage para acceso en la página de detalles
            const producto = productos.find(p => p.id === id);
            sessionStorage.setItem('productoSeleccionado', JSON.stringify(producto));
            window.open('detalle-producto.html', '_blank');
        }

        // Renderizar productos iniciales
        renderizarProductos();
