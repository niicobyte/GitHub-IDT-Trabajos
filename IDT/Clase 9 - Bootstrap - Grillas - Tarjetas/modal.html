<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal de Bootstrap</title>
    <link rel="stylesheet" href="../Clase 9 - Bootstrap - Grillas - Tarjetas/css/bootstrap.min.css">
</head>
<body>
    <nav>
        <div class="container-fluid">
            <a class="navbar-brand" href="../Clase 9 - Bootstrap - Grillas - Tarjetas/inicio.html">Ir al inicio</a>
        </div>
    </nav>
    <h1 style="text-align: center">Modal de Bootstrap</h1>
    <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#exampleModal">
        Ejecutar modelo de Modal de Bootstrap
    </button>
    <div class="modal fade" id="exampleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Titulo del modal.</h5>
                    <button type="button" class="close" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p>Este es el cuerpo del modal.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-primary">Guardar cambios</button>
                </div>
            </div>
        </div>
    </div>
    <script src="../Clase 9 - Bootstrap - Grillas - Tarjetas/js/jquery-3.3.1.min.js"></script>
    <script src="../Clase 9 - Bootstrap - Grillas - Tarjetas/js/bootstrap.js"></script>
</body>
</html>
