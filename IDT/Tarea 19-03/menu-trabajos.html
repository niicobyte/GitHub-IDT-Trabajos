<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Trabajos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container-menu {
            max-width: 900px;
            width: 100%;
        }
        .menu-header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .menu-header h1 {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .menu-header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .menu-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            animation: slideInCard 0.8s ease-out;
        }
        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }
        .menu-card a {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 30px 20px;
            text-align: center;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .menu-card:hover a {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        .menu-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
        }
        .menu-text {
            display: block;
            font-size: 0.95rem;
        }
        @keyframes slideInCard {
            from {
                margin-left: 100%;
                width: 300%;
                opacity: 0;
            }
            to {
                margin-left: 0%;
                width: 100%;
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container-menu">
        <div class="menu-header">
            <h1>📚 Mis Trabajos</h1>
            <p>Selecciona un proyecto para ver los detalles</p>
        </div>
        
        <div class="menu-grid">
            <div class="menu-card">
                <a href="animaciones-ejercicio2.html">
                    <span class="menu-icon">✨</span>
                    <span class="menu-text">Animaciones - Ejercicio 2</span>
                </a>
            </div>
            
            <div class="menu-card">
                <a href="animaciones-inicio.html">
                    <span class="menu-icon">🎬</span>
                    <span class="menu-text">Animaciones - Inicio</span>
                </a>
            </div>
            
            <div class="menu-card">
                <a href="animaciones-ejercicio3.html">
                    <span class="menu-icon">🚀</span>
                    <span class="menu-text">Animaciones - Ejercicio 3</span>
                </a>
            </div>
            
            <div class="menu-card">
                <a href="categorias-inicio.html">
                    <span class="menu-icon">📂</span>
                    <span class="menu-text">Categorías - Inicio</span>
                </a>
            </div>
            
            <div class="menu-card">
                <a href="flores-inicio.html">
                    <span class="menu-icon">🌸</span>
                    <span class="menu-text">Flores - Inicio</span>
                </a>
            </div>
            
            <div class="menu-card">
                <a href="responsive-design-2.html">
                    <span class="menu-icon">📱</span>
                    <span class="menu-text">Responsive Design 2</span>
                </a>
            </div>
            
            <div class="menu-card">
                <a href="responsive-design.html">
                    <span class="menu-icon">💻</span>
                    <span class="menu-text" >Responsive Design</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
