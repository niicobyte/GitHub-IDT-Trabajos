<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación - Ejercicio 2</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            min-height: 100vh;
            margin: 0;
        }

        h2 {
            animation-duration: 2.5s;
            animation-name: slidein;
            color: #ffffff;
            font-size: 2.5em;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            margin: 30px 0 20px 0;
            letter-spacing: 1px;
        }

        p {
            animation-duration: 3s;
            animation-name: slidein;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 500;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            border-left: 5px solid #0088ff;
            margin: 15px 0;
        }

        p:last-child {
            display: flex;
            justify-content: center;
            align-items: center;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding: 20px 20px;
        }

        a {
            display: inline-block;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        @keyframes slidein {
            from {
                margin-left: 100%;
                width: 300%;
            }

            75% {
                font-size: 300%;
                margin-left: 25%;
            }

            to {
                margin-left: 0%;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h2>Ejercicio de Animación 2</h2>
    <p>Este es una prueba de animación sencilla. Me gusta mucho es como para un anuncio, o como para poner algo nuevo o ofertas del dia o incluso promociones especiales.</p>
    <p><a href="animaciones-ejercicio3.html">Ir al siguiente ejercicio 3</a></p>
    <p><a href="animaciones-inicio.html">Ir a la página de inicio</a></p>
</body>
</html>
